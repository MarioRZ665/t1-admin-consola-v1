<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Premium Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --brand-primary: #8b5cf6;
        --brand-secondary: #3b82f6;
        --bg-dark: #0f172a;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-dark);
        color: white;
        overflow: hidden;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .background-layers {
        position: fixed;
        inset: 0;
        z-index: -1;
      }
      .blob {
        position: absolute;
        width: 500px;
        height: 500px;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
        filter: blur(100px);
        border-radius: 50%;
        opacity: 0.15;
        animation: float 20s infinite alternate;
      }
      .blob-1 { top: -100px; right: -100px; }
      .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; }
      
      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(50px, 50px) scale(1.1); }
      }

      .login-card {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 48px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .logo-section {
        text-align: center;
        margin-bottom: 32px;
      }
      .logo-icon {
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      }
      .logo-icon svg { width: 24px; height: 24px; fill: white; }
      .title { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.025em; }
      .subtitle { color: rgba(255, 255, 255, 0.5); margin-top: 8px; font-size: 14px; }

      .form-group { margin-bottom: 20px; }
      .label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: rgba(255, 255, 255, 0.7); }
      .input-wrapper { position: relative; }
      .input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px 16px;
        color: white;
        font-size: 15px;
        transition: all 0.3s;
        box-sizing: border-box;
      }
      .input:focus {
        outline: none;
        border-color: var(--brand-primary);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
      }
      .input::placeholder { color: rgba(255, 255, 255, 0.2); }

      .btn {
        width: 100%;
        background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
        border: none;
        border-radius: 12px;
        padding: 14px;
        color: white;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 12px;
        box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
      }
      .btn:hover { transform: translateY(-2px); box-shadow: 0 15px 20px -5px rgba(139, 92, 246, 0.4); }
      .btn:active { transform: translateY(0); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .error-msg {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        color: #ef4444;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        margin-bottom: 20px;
        text-align: center;
      }

      .footer-links { text-align: center; margin-top: 24px; font-size: 13px; color: rgba(255, 255, 255, 0.4); }
      .footer-links a { color: var(--brand-primary); text-decoration: none; font-weight: 500; }
      .footer-links a:hover { text-decoration: underline; }

      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body>
    <div class="background-layers">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
      <div class="logo-section">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
        </div>
        <h1 class="title">Velocity</h1>
        <p class="subtitle">Welcome back! Please sign in.</p>
      </div>

      <form 
        x-data="{ 
          correo: '', 
          password: '', 
          error: '', 
          loading: false,
          async handleLogin() {
            this.error = '';
            this.loading = true;
            try {
              const success = await window.auth.login(this.correo, this.password);
              if (success) {
                window.location.href = '/dashboard';
              }
            } catch (err) {
              this.error = err.message || 'Authentication failed';
            } finally {
              this.loading = false;
            }
          }
        }"
        @submit.prevent="handleLogin"
      >
        <div x-show="error" class="error-msg" x-text="error" x-cloak></div>

        <div class="form-group">
          <label class="label">Email Address</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              class="input" 
              placeholder="admin@example.com" 
              x-model="correo" 
              required 
            />
          </div>
        </div>

        <div class="form-group">
          <label class="label">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              class="input" 
              placeholder="••••••••" 
              x-model="password" 
              required 
            />
          </div>
        </div>

        <button type="submit" class="btn" :disabled="loading">
          <span x-show="!loading">Sign In</span>
          <span x-show="loading">Authenticating...</span>
        </button>

        <div class="footer-links">
          Don't have an account? <a href="#">Create Request</a>
        </div>
      </form>
    </div>
  </body>
</html>
